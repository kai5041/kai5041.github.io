<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404</title>

  <script>
    (function () {
      var path = window.location.pathname || "";
      var parts = path.split("/").filter(Boolean);

      var lang = "en";

      if (parts.length > 0) {
        var candidate = parts[0];

        var supported = ["en", "it", "ja"];
        if (supported.indexOf(candidate) !== -1) {
          lang = candidate;
        }
      }

      window.location.replace("/" + lang + "/404/");
    })();
  </script>

  <noscript>
    <meta http-equiv="refresh" content="0; url=/en/404/">
  </noscript>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
