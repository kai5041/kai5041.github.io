offers:
  custom_software_cli:
    title:
      en: "Custom Command-Line Application"

    includes:
      - en: "Windows or/and Linux support"
      - en: "English as default display language"
      - en: "Help section per command"
      - en: "Tests on an appropriate reproducible environment"

    features_increasing_price:
      - en: "Web integrations"
      - en: "LANG_PRICE_NOTE"

    excludes:
      - en: "Graphical User Interface (GUI)"
      - en: "Database integration (fetching, insertion, updating...)"
      - en: "Game development"
      - en: "macOS builds"
      - en: "Hosting, deployment, infrastructure setup or ongoing maintenance"


    pricing:
      en: "International: From €500<br>Japan: From ¥70,000"
      ja: "海外：€500から<br>日本：70,000円から"

  custom_software_gui:
    disabled: true

    title:
      en: "Custom Software (Graphical User Interface)"

    includes:
      - en: "Graphic application with a defined and agreed function set"
      - en: "Command-line application with a defined and agreed command set"
      - en: "Command-level usage documentation"
      - en: "Error handling for specified input and execution cases for both interfaces"
      - en: "Deterministic execution behavior within defined specifications"
      - en: "Testing in Ubuntu 24.04 LTS container environment"
      - en: "English output as default runtime language"

    features_increasing_price:
      - en: "Web-interfacing commands"
      - en: "Database interfacing"
      - en: "LANG_PRICE_NOTE"

    excludes:
      - en: "Game development"
      - en: "Hosting, deployment, infrastructure setup, or ongoing maintenance"
      - en: "Unspecified feature expansion beyond the agreed command set"

    pricing:
      en: "International: From €2000<br>Japan: Starting from ¥300,000"
      ja: "海外：€2000から<br>日本：30万円から"
