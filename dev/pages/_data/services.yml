cards:
  - title: Code Debugging
    description: Fast debugging and fixes for broken code, scripts, and builds.
    idealFor:
      - Python scripts that don’t run or behave incorrectly
      - Build system issues (CMake, Make, compilation errors)
      - Dependency/environment problems
      - Small logic or runtime bugs
    
    included:
      - Diagnosis of the issue
      - Fix or patch (when possible)
      - Short explanation of the cause
    
    notIncluded:
      - Large-scale refactoring
      - Full project rewrites
      - Ongoing maintenance or support contracts
    pricing: "20-80 EUR (based on complexity)"
    delivery: "same day to 48h depending on issue"
  
  - title: Automation Scripts
    description: Small scripts to automate repetitive tasks and workflows.
    idealFor:
      - File organization, renaming, cleanup tasks
      - CSV / JSON / YAML processing
      - Simple CLI tools for personal workflows
      - Repetitive manual tasks
    included:
      - One focused script per task
      - Clean minimal implementation
      - Basic usage instructions
    notIncluded:
      - Large applications
      - Complex backend systems
      - Long-term maintenance
    pricing: "30-100 EUR per script"
    delivery: "24-72h depending on scope"
  
  - title: Linux & Environment Fixes
    description: Fixing specific development environment issues.
    idealFor:
      - Python or C++ build/runtime errors
      - CMake / Make / toolchain failures
      - Dependency or import errors
      - Broken dev setups with reproducible errors
    included:
      - Diagnosis of one issue
      - Fix or minimal working solution
      - Short root-cause explanation
    notIncluded:
      - Full system recovery
      - Multi-issue debugging
      - Environment redesigns
      - Ongoing support
    pricing: "30-80 EUR per issue"
    delivery: "24-48h depending on complexity"
  
  - title: Quick Debugging & Review
    description: Fast identification of issues in small code sections.
    idealFor:
      - Why doesn’t this work cases
      - Small broken functions
      - Logic or flow issues
      - Quick second opinion
    included:
      - Quick code analysis
      - Issue identification
      - Minimal fix suggestion
    notIncluded:
      - System design
      - Large debugging projects
      - Extended consulting
    pricing: "20-50 EUR per review"
    delivery: "usually same day"
  