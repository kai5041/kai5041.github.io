offers:
  en:
    - title: Automation and Operational Tools
      description: Custom CLI tools and lightweight internal systems for automation, infrastructure interfacing, data processing, and repetitive workflows. 
      pricing: "Typical projects: 150~800 EUR depending on scope."
      cta: Discuss your workflow

    - title: Websites for small companies and freelancers
      description: Fast, maintainable websites for creators, independent workers, and small businesses that need a reliable online presence.
      pricing: "Simple websites starting from 250 EUR."
      
      cta: Launch your website
    
    - title: Infrastructure and Backend Systems
      description: Backend services, automation pipelines, and infrastructure support for projects that require reliability, maintainability, and room to grow.
      pricing: "Custom pricing based on project requirements."
      cta: Request a free technical consultation

  it:
    - title: Strumenti di automazione e operativi
      description: Strumenti CLI personalizzati e sistemi interni leggeri per automazione, interfacciamento con infrastrutture, elaborazione dati e flussi di lavoro ripetitivi.
      pricing: "Progetti tipici: 150-800 EUR in base alla complessità."
      cta: Analizza il tuo workflow

    - title: Siti web per piccole imprese e freelance
      description: Siti veloci e mantenibili per creator, professionisti indipendenti e piccole attività che necessitano di una presenza online affidabile.
      pricing: "Siti semplici a partire da 250 EUR."
      cta: Avvia il tuo sito web

    - title: Infrastrutture e sistemi backend
      description: Servizi backend, pipeline di automazione e supporto infrastrutturale per progetti che richiedono affidabilità, manutenzione e scalabilità.
      pricing: "Prezzi personalizzati in base ai requisiti del progetto."
      cta: Richiedi una consulenza tecnica gratuita


  ja:
    - title: 自動化・運用ツール
      description: 自動化、インフラ連携、データ処理、反復作業のためのカスタムCLIツールおよび軽量な社内システム。
      pricing: "一般的なプロジェクト: 150〜800 EUR（規模により変動）"
      cta: ワークフローについて相談する

    - title: 小規模企業・フリーランス向けウェブサイト
      description: クリエイターや個人事業主、小規模ビジネス向けの高速で保守しやすい信頼性の高いウェブサイト。
      pricing: "シンプルなサイトは250 EURから"
      cta: ウェブサイトを公開する

    - title: インフラ・バックエンドシステム
      description: 信頼性・保守性・拡張性が求められるプロジェクト向けのバックエンドサービス、自動化パイプライン、インフラ支援。
      pricing: "プロジェクト要件に応じた個別見積もり"
      cta: 無料技術相談を依頼する


  ro:
    - title: Instrumente de automatizare și operaționale
      description: Instrumente CLI personalizate și sisteme interne ușoare pentru automatizare, integrare cu infrastructura, procesare de date și fluxuri repetitive de lucru.
      pricing: "Proiecte tipice: 150-800 EUR în funcție de complexitate."
      cta: Analizează fluxul tău de lucru

    - title: Site-uri pentru companii mici și freelanceri
      description: Site-uri rapide și ușor de întreținut pentru creatori, profesioniști independenți și afaceri mici care au nevoie de o prezență online fiabilă.
      pricing: "Site-uri simple de la 250 EUR."
      cta: Lansează site-ul tău

    - title: Infrastructură și sisteme backend
      description: Servicii backend, pipeline-uri de automatizare și suport de infrastructură pentru proiecte care necesită fiabilitate, mentenanță și scalabilitate.
      pricing: "Prețuri personalizate în funcție de cerințele proiectului."
      cta: Solicită o consultație tehnică gratuită


currency_note:
  en: |
    Accepted currencies: EUR, USD, RON, JPY, USDC (Polygon PoS).

    Fiat currency payments are referenced in EUR using the ECB Reference Rates:
    <a rel="noopener noreferrer" target="_blank"
    href="https://www.ecb.europa.eu/stats/policy_and_exchange_rates/euro_reference_exchange_rates/html/index.en.html">
    https://www.ecb.europa.eu/stats/policy_and_exchange_rates/euro_reference_exchange_rates/html/index.en.html</a>

    Cryptocurrency payments are referenced in EUR using the market rate listed on Kraken stated by the invoice:
    <a rel="noopener noreferrer" target="_blank" href="https://kraken.com/">
    https://kraken.com/</a>

  it: |
    Valute accettate: EUR, USD, RON, JPY, USDC (Polygon PoS).

    I pagamenti in valuta fiat sono convertiti in EUR utilizzando i tassi di riferimento BCE:
    <a rel="noopener noreferrer" target="_blank"
    href="https://www.ecb.europa.eu/stats/policy_and_exchange_rates/euro_reference_exchange_rates/html/index.en.html">
    https://www.ecb.europa.eu/stats/policy_and_exchange_rates/euro_reference_exchange_rates/html/index.en.html</a>

    I pagamenti in criptovaluta sono convertiti in EUR utilizzando il tasso di mercato di Kraken indicato in fattura:
    <a rel="noopener noreferrer" target="_blank" href="https://kraken.com/">
    https://kraken.com/</a>

  ja: |
    対応通貨: EUR、USD、RON、JPY、USDC（Polygon PoS）。
    <br>

    法定通貨の支払いはEUR換算でECB基準為替レートを使用します：
    <a rel="noopener noreferrer" target="_blank"
    href="https://www.ecb.europa.eu/stats/policy_and_exchange_rates/euro_reference_exchange_rates/html/index.en.html">ECB基準為替レート</a>

    <br>

    暗号資産の支払いは、請求書に記載されるKrakenの市場レートを使用してEUR換算されます： <a rel="noopener noreferrer" target="_blank" href="https://kraken.com/">Kraken公式サイト</a>

  ro: |
    Monede acceptate: EUR, USD, RON, JPY, USDC (Polygon PoS).

    Plățile în monedă fiat sunt convertite în EUR folosind cursurile de referință BCE:
    <a rel="noopener noreferrer" target="_blank"
    href="https://www.ecb.europa.eu/stats/policy_and_exchange_rates/euro_reference_exchange_rates/html/index.en.html">
    https://www.ecb.europa.eu/stats/policy_and_exchange_rates/euro_reference_exchange_rates/html/index.en.html</a>

    Plățile în criptomonede sunt convertite în EUR folosind cursul de piață de pe Kraken menționat pe factură:
    <a rel="noopener noreferrer" target="_blank" href="https://kraken.com/">
    https://kraken.com/</a>
