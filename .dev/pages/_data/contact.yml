process:
  title:
    en: "How the process works"
    it: "Come funziona il processo"

  intro:
    en: "You will be guided through the entire process from initial contact to final delivery. Each step is handled together with clear instructions and support."
    it: "Verrai guidato attraverso l’intero processo, dal primo contatto alla consegna finale. Ogni fase viene gestita insieme con istruzioni chiare e supporto."

  step1:
    title:
      en: "Step 1 - Initial contact"
      it: "Fase 1 - Primo contatto"
    text:
      en: "You send a general description of your request to one of the contact methods listed"
      it: "Invio di una descrizione generale della tua richiesta tramite uno dei metodi di contatto indicati"
    link_text:
      en: "below"
      it: "sotto"

  step2:
    title:
      en: "Step 2 - Project review and compliance check"
      it: "Fase 2 - Valutazione del progetto e verifica di conformità"
    text:
      en: "The request is evaluated for feasibility and scope alignment."
      it: "La richiesta viene valutata in base alla fattibilità e all’allineamento con l’ambito del progetto."

    required_intro:
      en: "The following information is required before acceptance:"
      it: "Le seguenti informazioni sono richieste prima dell’accettazione:"

    requirements_html:
      en: |
        <ul>
          <li>Billing name (full name or legal entity name, as it will appear on the invoice)</li>
          <li>Country of residence and Country of Incorporation (if legal entity)</li>
          <li>Tax identification details if applicable</li>
          <li>Billing address and email address for invoice delivery</li>
        </ul>
      it: |
        <ul>
          <li>Nome di fatturazione (nome completo o ragione sociale, come apparirà in fattura)</li>
          <li>Paese di residenza e Paese di costituzione (se persona giuridica)</li>
          <li>Dati fiscali se applicabili</li>
          <li>Indirizzo di fatturazione e indirizzo email per l’invio della fattura</li>
        </ul>

    note:
      en: "Compliance screening is mandatory. Services cannot be provided without verification of applicable legal and tax requirements."
      it: "La verifica di conformità è obbligatoria. I servizi non possono essere forniti senza la verifica dei requisiti legali e fiscali applicabili."

  step3:
    title:
      en: "Step 3 - Confirmation and Agreement"
      it: "Fase 3 - Conferma e accordo"
    text:
      en: "Scope, pricing, and timeline are confirmed. Agreements may be signed using either a recognized electronic signature (eIDAS-compliant) or a scanned handwritten signature in PDF."
      it: "Ambito, prezzi e tempistiche vengono confermati. Gli accordi possono essere firmati tramite firma elettronica riconosciuta (conforme eIDAS) oppure firma autografa scannerizzata in PDF."

    provider_tax_note:
      en: "Tax Residency Certificate (Attestato di Residenza Fiscale) is provided at agreement stage to determine applicable withholding tax treatment."
      it: "L’Attestato di Residenza Fiscale viene fornito in fase di accordo per determinare l’eventuale applicazione della ritenuta fiscale."

  step4:
    title:
      en: "Step 4 - Development Phase"
      it: "Fase 4 - Sviluppo"
    text1:
      en: "Work begins after confirmation and, where applicable, after receipt of the agreed upfront payment. Progress updates and previews are provided when applicable."
      it: "Il lavoro inizia dopo la conferma e, ove previsto, dopo la ricezione dell’acconto concordato. Aggiornamenti e anteprime vengono forniti quando applicabile."
    text2:
      en: "Source code is not included in the previews."
      it: "Il codice sorgente non è incluso nelle anteprime."

  step5:
    title:
      en: "Step 5 - Delivery"
      it: "Fase 5 - Consegna"
    text:
      en: "Final product is delivered after payment confirmation."
      it: "Il prodotto finale viene consegnato dopo la conferma del pagamento."

  step6:
    title:
      en: "Step 6 - Setup and Handover"
      it: "Fase 6 - Configurazione e consegna operativa"
    text:
      en: "System setup assistance is provided if included in the agreement."
      it: "L’assistenza alla configurazione del sistema viene fornita se inclusa nell’accordo."

  step7:
    title:
      en: "Step 7 - Post-delivery support"
      it: "Fase 7 - Supporto post-consegna"
    text:
      en: "48h support window after setup completion."
      it: "Finestra di supporto di 48 ore dopo il completamento della configurazione."

  closing:
    en: "After this, the service is considered completed."
    it: "Dopo questo, il servizio è considerato completato."
