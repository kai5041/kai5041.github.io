    He also develops and maintains several open-source projects, listed <a href="#projects">below</a>.

  it: >
    Kai, conosciuto anche come 解, è un aspirante ricercatore attualmente focalizzato sul campo IT, con enfasi sulla risoluzione dei problemi e sulla progettazione di sistemi e strumenti veloci e leggeri.
    <br>
    Inoltre sviluppa e mantiene diversi progetti open-source, elencati qui <a href="#projects">sotto</a>.

